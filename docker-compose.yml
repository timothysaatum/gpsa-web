services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gpsa-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - gpsa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=/api/v1
    image: gpsa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gpsa-network

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - gpsa-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: gpsa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: gpsa_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpsa -d gpsa_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gpsa-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gpsa-backend
    entrypoint: ["sh", "-c", "alembic upgrade head"]
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate
    networks:
      - gpsa-network

  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gpsa-backend
    entrypoint: ["python", "scripts/seed_db.py"]
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles:
      - seed
    networks:
      - gpsa-network

volumes:
  pgdata:
  certbot-data:

networks:
  gpsa-network:
    driver: bridge
