[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL is overridden in env.py from app settings — keep this as placeholder
sqlalchemy.url = postgresql+asyncpg://vermithor:SecurePass!123@localhost/gpsauddb

# [post_write_hooks]
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME
[post_write_hooks]
# Disable ruff hook for now (you can re-enable later)
# hooks = ruff

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
